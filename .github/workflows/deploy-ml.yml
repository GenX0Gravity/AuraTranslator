name: CD — Deploy ML Service to Cloud Run (GPU)

on:
  push:
    branches: [master]
    paths:
      - 'ml-service/**'
  workflow_dispatch:

env:
  PROJECT_ID: codelabs-1-491815
  REGION: us-central1
  SERVICE_NAME: auratranslator-ml
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: auratranslator-repo
  IMAGE_NAME: auratranslator-ml

jobs:
  deploy-ml:
    name: Build & Deploy ML Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build ML Docker image
        run: |
          docker build \
            -f ml-service/Dockerfile \
            -t "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            -t "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest" \
            ml-service

      - name: Push ML Docker image
        run: |
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker push "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Deploy ML Service to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --port 8090 \
            --memory 8Gi \
            --cpu 4 \
            --min-instances 0 \
            --max-instances 3 \
            --concurrency 4 \
            --timeout 300 \
            --set-env-vars="MODEL_CACHE_DIR=/tmp/models" \
            --service-account=auratranslator-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Get ML Service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "ML Service deployed to: $URL"
